<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Inter; background:#0f172a; color:white; padding:20px;}
.calendar { display:flex; gap:20px; }
.day { border:1px solid #333; padding:10px; width:100px; cursor:pointer;}
</style>
</head>

<body>

<h1>📅 Team Calendar</h1>

<select id="user">
<option>user1</option>
<option>user2</option>
<option>user3</option>
<option>user4</option>
<option>user5</option>
<option>user6</option>
</select>

<button onclick="load()">Load</button>

<div id="calendar" class="calendar"></div>

<script>
const supabase = supabase.createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

let currentUser;

function load(){
  currentUser = document.getElementById("user").value;
  render();
  subscribe();
}

async function render(){
  const { data } = await supabase.from("events").select("*");

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  for(let i=1;i<=30;i++){
    let d = "2026-05-"+String(i).padStart(2,"0");

    let div = document.createElement("div");
    div.className="day";
    div.innerHTML = "<b>"+i+"</b>";

    data.filter(e=>e.date===d).forEach(e=>{
      div.innerHTML += "<div>"+(e.type==="croissant"?"🥐":"🏖")+" "+e.user_name+"</div>";
    });

    div.onclick = ()=>add(d);
    cal.appendChild(div);
  }
}

async function add(date){
  const type = prompt("1=conges 2=croissant");
  if(!type) return;

  await supabase.from("events").insert({
    date,
    type: type==="1"?"conges":"croissant",
    user_name: currentUser
  });

  render();
}

// TEMPS RÉEL
function subscribe(){
  supabase
    .channel('events')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, () => {
      render();
    })
    .subscribe();
}
</script>

</body>
</html>
